aid: tractable
name: Tractable
description: >-
  Tractable is a London-headquartered artificial intelligence company founded
  in 2014 by Alexandre Dalyac, Razvan Ranca, and Adrien Cohen that applies
  computer vision and deep learning to automate visual damage assessment for
  auto and property insurance claims. The platform analyzes photos of
  vehicles and buildings down to the pixel to produce accident first-notice-
  of-loss (FNOL) triage decisions, AI-generated preliminary repair estimates,
  automated claim review for fraud and consistency, subrogation packet
  analysis, and property repair-cost estimation and underwriting condition
  assessment. Tractable's flagship offerings include Auto Estimator, Auto
  Damage Appraiser, Auto Salvage, Property Estimator, Property Underwriter,
  and the LumaScanner fixed-operations vehicle scanning product. The company
  serves insurers, dealerships, repair networks, recyclers, and fleet and
  rental operators including GEICO, Aviva, Mitchell, Tokio Marine, Admiral,
  Sompo, Aioi Nissay Dowa, and LKQ. Tractable reached unicorn status in
  June 2021 and secured a $65M investment from SoftBank Vision Fund 2 in
  July 2023, scaling to over 300 employees across offices in London, Warsaw,
  Paris, Milan, Spain, Romania, New York, Toronto, Tokyo, and Bangkok. The
  product is delivered through flexible desktop and API integrations with
  FNOL, estimatics, and claim review systems, but the developer surface is
  gated to enterprise partners — there is no public developer portal,
  self-service API key, OpenAPI specification, SDK release, or open-source
  repository, and no publicly published authentication, endpoint, pricing,
  or rate-limit documentation.
